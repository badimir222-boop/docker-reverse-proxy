services:
  webapp:
    image: nginx:alpine
    container_name: my-webapp
    expose:
      - "80"
    networks:
      - proxy-network
    restart: unless-stopped

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-reverse-proxy
    ports:
      - "8181:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - webapp
    networks:
      - proxy-network
    restart: unless-stopped

networks:
  proxy-network:
    driver: bridge
